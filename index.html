<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ store_name }} - Chat Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
        }
        .chat-container { 
            width: 100%;
            max-width: 420px; 
            background: white; 
            border-radius: 16px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.12); 
            overflow: hidden; 
        }
        .chat-header { 
            background: #C0392B; 
            color: white; 
            padding: 18px; 
            text-align: center; 
        }
        .chat-header h2 { font-size: 18px; margin-bottom: 4px; }
        .chat-header p { font-size: 12px; opacity: 0.9; }
        .chat-box { 
            height: 480px; 
            overflow-y: auto; 
            padding: 16px; 
            background: #fff; 
        }
        .message { 
            margin: 10px 0; 
            padding: 10px 14px; 
            border-radius: 18px; 
            max-width: 75%; 
            word-wrap: break-word; 
            line-height: 1.4;
            font-size: 14px;
        }
        .user { 
            background: #C0392B; 
            color: white; 
            margin-left: auto; 
            border-bottom-right-radius: 4px;
        }
        .bot { 
            background: #f1f0f0; 
            color: #1c1e21; 
            border-bottom-left-radius: 4px;
        }
        .input-area { 
            display: flex; 
            padding: 12px; 
            border-top: 1px solid #e4e6eb; 
            background: white; 
        }
        #userInput { 
            flex: 1; 
            padding: 10px 14px; 
            border: 1px solid #ddd; 
            border-radius: 20px; 
            outline: none; 
            font-size: 14px;
        }
        #userInput:focus { border-color: #C0392B; }
        button { 
            margin-left: 8px; 
            padding: 0 18px; 
            background: #C0392B; 
            color: white; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: 600;
        }
        button:hover { background: #A93226; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>{{ store_name }}</h2>
            <p>Ask about bangles, jhumkas, shipping & COD</p>
        </div>
        <div class="chat-box" id="chatBox">
            <div class="message bot">Namaste! Welcome to {{ store_name }} 👋 How can I help you today?</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            
            addMessage(message, 'user');
            userInput.value = '';
            
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                addMessage(data.reply, 'bot');
            } catch (error) {
                addMessage('Sorry, connection error. Try again.', 'bot');
            }
        }
    </script>
</body>
</html>
