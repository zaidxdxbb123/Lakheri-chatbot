<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ store_name }} - Chat Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #FFF5F5 0%, #FFE8E8 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
        }
        .chat-container { 
            width: 100%;
            max-width: 400px; 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 10px 40px rgba(192, 57, 43, 0.2); 
            overflow: hidden; 
        }
        .chat-header { 
            background: #C0392B; 
            color: white; 
            padding: 20px; 
            text-align: center; 
        }
        .chat-header h2 { 
            font-size: 20px; 
            margin-bottom: 5px; 
            font-weight: 600;
        }
        .chat-header p { 
            font-size: 13px; 
            opacity: 0.95; 
        }
        .chat-box { 
            height: 450px; 
            overflow-y: auto; 
            padding: 16px; 
            background: #fafafa; 
        }
        .chat-box::-webkit-scrollbar { width: 6px; }
        .chat-box::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
        .message { 
            margin: 12px 0; 
            padding: 12px 16px; 
            border-radius: 18px; 
            max-width: 78%; 
            word-wrap: break-word; 
            line-height: 1.5;
            font-size: 14px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user { 
            background: #C0392B; 
            color: white; 
            margin-left: auto; 
            border-bottom-right-radius: 4px;
        }
        .bot { 
            background: white; 
            color: #2c3e50; 
            border: 1px solid #eee;
            border-bottom-left-radius: 4px;
            white-space: pre-line;
        }
        .input-area { 
            display: flex; 
            padding: 14px; 
            border-top: 1px solid #eee; 
            background: white; 
            gap: 8px;
        }
        #userInput { 
            flex: 1; 
            padding: 12px 16px; 
            border: 1px solid #ddd; 
            border-radius: 24px; 
            outline: none; 
            font-size: 14px;
            transition: border 0.2s;
        }
        #userInput:focus { border-color: #C0392B; }
        button { 
            padding: 12px 22px; 
            background: #C0392B; 
            color: white; 
            border: none; 
            border-radius: 24px; 
            cursor: pointer; 
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover { background: #A93226; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>{{ store_name }}</h2>
            <p>Ask about bangles, jhumkas, shipping & COD</p>
        </div>
        <div class="chat-box" id="chatBox">
            <div class="message bot">Namaste! Welcome to {{ store_name }} 👋 

I can help you with:
• Product prices
• Shipping & COD
• Returns 

How can I help you today?</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');

        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            
            addMessage(message, 'user');
            userInput.value = '';
            
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                addMessage(data.reply, 'bot');
            } catch (error) {
                addMessage('Sorry, connection error. Please try again.', 'bot');
            }
        }
    </script>
</body>
</html>
